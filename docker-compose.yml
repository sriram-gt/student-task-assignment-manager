version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: stam_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: stam
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: stam_backend
    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/stam
      SECRET_KEY: your-super-secret-key-change-this-later
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build: ./frontend
    container_name: stam_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: